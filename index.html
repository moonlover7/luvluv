<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at 50% 30%, #2a0033, #0a0012);
    font-family: 'Segoe UI', 'Georgia', serif;
    overflow: hidden;
}
.bg-particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,105,180,0.12), transparent);
    animation: drift 15s infinite ease-in-out;
    pointer-events: none;
}
@keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.2); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,105,180,0.08), transparent 60%);
    animation: glow 4s infinite alternate ease-in-out;
    pointer-events: none;
}
@keyframes glow {
    from { opacity: .3; }
    to { opacity: .7; }
}

.envelope-container {
    position: relative;
    width: 340px;
    height: 240px;
    cursor: pointer;
    z-index: 2;
    transition: transform 0.3s ease;
}
.envelope-container:hover { transform: scale(1.02); }

.envelope {
    position: relative;
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #900030, #700020);
    border-radius: 14px;
    box-shadow:
        0 20px 40px rgba(0,0,0,.5),
        0 0 60px rgba(255,20,80,0.1),
        inset 0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
    transition: box-shadow 0.5s ease;
}
.envelope.open {
    box-shadow:
        0 25px 50px rgba(0,0,0,.6),
        0 0 80px rgba(255,20,80,0.2),
        inset 0 1px 0 rgba(255,255,255,0.1);
}

.flap {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, #c00040, #900030);
    clip-path: polygon(0 0, 50% 55%, 100% 0, 100% 100%, 0 100%);
    transform-origin: top;
    transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    z-index: 4;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.flap::after {
    content: "🎂";
    position: absolute;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    transition: opacity 0.3s;
}
.envelope.open .flap {
    transform: rotateX(180deg);
}
.envelope.open .flap::after { opacity: 0; }

.letter {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 300px;
    height: 200px;
    background: linear-gradient(135deg, #fff5f8, #ffe8f0);
    border-radius: 16px;
    transform: translateX(-50%) translateY(140px);
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    padding: 24px;
    text-align: center;
    z-index: 2;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.envelope.open .letter {
    transform: translateX(-50%) translateY(-40px);
}

.letter h2 {
    margin: 0 0 12px;
    color: #c00040;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 24px;
    text-shadow: 0 2px 4px rgba(192,0,64,0.1);
    letter-spacing: 1px;
}

.letter p {
    font-size: 15px;
    line-height: 1.7;
    color: #5a0020;
    min-height: 80px;
    font-style: italic;
    padding: 0 8px;
}

.page-indicator {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 10px 0;
}
.dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ddd;
    transition: all 0.3s ease;
}
.dot.active {
    background: #c00040;
    transform: scale(1.3);
    box-shadow: 0 0 8px rgba(192,0,64,0.4);
}


.buttons {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    gap: 10px;
}
button {
    background: linear-gradient(145deg, #c00040, #a00030);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(192,0,64,0.3);
    position: relative;
    overflow: hidden;
}
button::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
}
button:hover {
    background: linear-gradient(145deg, #a00030, #800020);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(192,0,64,0.4);
}
button:hover::after {
    transform: translateX(100%);
}
button:active { transform: translateY(0); }
button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
}

.rose {
    position: absolute;
    right: -130px;
    bottom: 15px;
    opacity: 0;
    transform: scale(0.3) rotate(-15deg);
    transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1;
}
.envelope.open ~ .rose {
    opacity: 1;
    transform: scale(1) rotate(0deg);
}

.bloom {
    position: relative;
    width: 55px;
    height: 55px;
    background: radial-gradient(circle at 30% 30%, #ff3377, #c00040);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(255,0,90,0.5), 0 0 40px rgba(255,0,90,0.2);
    animation: rosePulse 3s infinite ease-in-out;
}
@keyframes rosePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}
.bloom::before,
.bloom::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
}
.bloom::before {
    inset: 8px;
    background: radial-gradient(circle at 30% 30%, #ff6699, #900030);
}
.bloom::after {
    inset: 16px;
    background: radial-gradient(circle at 30% 30%, #ff99bb, #700020);
}
.stem {
    width: 5px;
    height: 150px;
    background: linear-gradient(to bottom, #3a3a3a, #0a0a0a);
    margin: auto;
    border-radius: 10px;
    position: relative;
}
.stem::before,
.stem::after {
    content: "🍃";
    position: absolute;
    font-size: 18px;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
}
.stem::before { left: -12px; top: 40px; transform: rotate(-30deg); }
.stem::after { right: -12px; top: 70px; transform: rotate(30deg) scaleX(-1); }


.hint {
    position: absolute;
    bottom: -50px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: #ff80aa;
    animation: hintPulse 2s infinite ease-in-out;
    text-shadow: 0 0 10px rgba(255,128,170,0.3);
}
@keyframes hintPulse {
    0%, 100% { opacity: 0.7; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
}
.envelope.open ~ .hint { display: none; }

.heart {
    position: absolute;
    color: #ff4d85;
    font-size: 18px;
    animation: floatHeart 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    pointer-events: none;
    filter: drop-shadow(0 0 6px rgba(255,77,133,0.5));
}
@keyframes floatHeart {
    0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    25% { transform: translateY(-40px) scale(1.2) rotate(10deg); opacity: 0.9; }
    50% { transform: translateY(-80px) scale(0.9) rotate(-5deg); opacity: 0.7; }
    100% { transform: translateY(-180px) scale(0.3) rotate(15deg); opacity: 0; }
}

.flower {
    position: absolute;
    width: 22px;
    height: 22px;
    background: radial-gradient(circle, #ff99bb, #c00040);
    border-radius: 50%;
    opacity: 0;
    animation: floatFlower 7s linear infinite;
    box-shadow: 0 0 10px rgba(192,0,64,0.3);
}
@keyframes floatFlower {
    0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
    15% { opacity: 1; transform: translateY(-30px) rotate(60deg) scale(1); }
    85% { opacity: 1; transform: translateY(-280px) rotate(300deg) scale(1); }
    100% { transform: translateY(-320px) rotate(360deg) scale(0.3); opacity: 0; }
}


.bee {
    position: absolute;
    width: 16px;
    height: 16px;
    background: radial-gradient(circle at 30% 30%, #ffeb3b, #ffc107);
    border-radius: 50%;
    box-shadow: 0 0 3px rgba(0,0,0,0.3);
    opacity: 0.9;
    animation: flyBee linear infinite;
}
.bee::before,
.bee::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 6px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    top: -2px;
    animation: wingFlap 0.15s infinite alternate;
}
.bee::before { left: -4px; }
.bee::after { right: -4px; }
@keyframes wingFlap {
    from { transform: scaleY(1); }
    to { transform: scaleY(0.3); }
}
@keyframes flyBee {
    0% { transform: translate(0,0) rotate(0deg); }
    20% { transform: translate(50px,-30px) rotate(25deg); }
    40% { transform: translate(-30px,-70px) rotate(-25deg); }
    60% { transform: translate(-50px,30px) rotate(20deg); }
    80% { transform: translate(20px,60px) rotate(-15deg); }
    100% { transform: translate(0,0) rotate(0deg); }
}

.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkleAnim 1.5s ease-out forwards;
    box-shadow: 0 0 6px #fff, 0 0 12px #ff80aa;
}
@keyframes sparkleAnim {
    0% { transform: scale(0); opacity: 1; }
    50% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
}

.typing-cursor::after {
    content: "|";
    animation: blink 1s infinite;
    color: #c00040;
}
@keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    pointer-events: none;
    animation: confettiFall 3s ease-out forwards;
}
@keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
}

.balloon {
    position: absolute;
    width: 40px;
    height: 50px;
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    animation: balloonFloat 4s ease-in-out forwards;
    pointer-events: none;
}
.balloon::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 60px;
    background: rgba(255,255,255,0.5);
    left: 50%;
    bottom: -60px;
    transform: translateX(-50%);
}
@keyframes balloonFloat {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    20% { opacity: 1; transform: translateY(-20px) scale(1); }
    100% { transform: translateY(-400px) scale(1); opacity: 0; }
}
</style>
<base target="_blank">
</head>

<body>

<div class="bg-particle" style="width:300px;height:300px;top:10%;left:10%;animation-delay:0s;"></div>
<div class="bg-particle" style="width:200px;height:200px;top:60%;right:15%;animation-delay:5s;"></div>
<div class="bg-particle" style="width:250px;height:250px;bottom:20%;left:30%;animation-delay:10s;"></div>

<div class="envelope-container" onclick="openEnvelope(event)">
    <div class="envelope" id="env">
        <div class="flap"></div>

        <div class="letter">
            <h2> Sameng Day! </h2>
            <p id="text" class="typing-cursor"></p>
            <div class="page-indicator" id="dots"></div>
            <div class="buttons">
                <button id="prevBtn" onclick="prevPage(event)">◀ Prev</button>
                <button id="nextBtn" onclick="nextPage(event)">Next ▶</button>
            </div>
        </div>
    </div>
    <div class="hint">Click the envelope to open </div>
</div>

<div class="rose">
    <div class="bloom"></div>
    <div class="stem"></div>
</div>

<script>
const pages = [
    "Happy Birthday, my love! ",
    "You fill my heart with so much joy and warmth every single day.",
    "On your special day, I wish you endless happiness, love, and beautiful memories.",
    "May this year bring you everything your heart desires. I love you to the moon and back! "
];

let currentPage = 0;
let isTyping = false;
const textEl = document.getElementById("text");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function initDots() {
    const dotsContainer = document.getElementById("dots");
    dotsContainer.innerHTML = "";
    for (let i = 0; i < pages.length; i++) {
        const dot = document.createElement("div");
        dot.className = "dot" + (i === 0 ? " active" : "");
        dotsContainer.appendChild(dot);
    }
}
initDots();

function updateDots() {
    const dots = document.querySelectorAll(".dot");
    dots.forEach((dot, i) => {
        dot.classList.toggle("active", i === currentPage);
    });
}

function updateButtons() {
    prevBtn.disabled = currentPage === 0;
    nextBtn.disabled = currentPage === pages.length - 1;
    prevBtn.style.opacity = currentPage === 0 ? "0.4" : "1";
    nextBtn.style.opacity = currentPage === pages.length - 1 ? "0.4" : "1";
}

function typeText(text, callback) {
    if (isTyping) return;
    isTyping = true;
    textEl.textContent = "";
    textEl.classList.add("typing-cursor");

    let i = 0;
    const speed = 35;

    function type() {
        if (i < text.length) {
            textEl.textContent += text.charAt(i);
            i++;
            setTimeout(type, speed + Math.random() * 20);
        } else {
            isTyping = false;
            textEl.classList.remove("typing-cursor");
            if (callback) callback();
        }
    }
    type();
}

function showPage(animate = true) {
    updateDots();
    updateButtons();
    if (animate) {
        typeText(pages[currentPage]);
    } else {
        textEl.textContent = pages[currentPage];
    }
}

function nextPage(e) {
    e.stopPropagation();
    if (currentPage < pages.length - 1 && !isTyping) {
        currentPage++;
        showPage();
    }
}

function prevPage(e) {
    e.stopPropagation();
    if (currentPage > 0 && !isTyping) {
        currentPage--;
        showPage();
    }
}

function openEnvelope(e) {
    const env = document.getElementById("env");
    const isOpening = !env.classList.contains("open");

    env.classList.toggle("open");

    if (isOpening) {
        setTimeout(() => {
            showPage();
        }, 400);

        spawnHearts(e.clientX, e.clientY);
        spawnFlowers();
        spawnBees();
        spawnSparkles();
        spawnConfetti();
        spawnBalloons();
    } else {
        // Closing - reset
        textEl.textContent = "";
        currentPage = 0;
        updateDots();
        updateButtons();
    }
}

function spawnHearts(x, y) {
    const colors = ["❤", "💖", "💕", "💗", "💝", "💘"];
    for (let i = 0; i < 15; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = colors[Math.floor(Math.random() * colors.length)];
        const size = 16 + Math.random() * 14;
        heart.style.fontSize = size + "px";
        heart.style.left = (x + (Math.random() * 60 - 30)) + "px";
        heart.style.top = (y + (Math.random() * 20 - 10)) + "px";
        heart.style.animationDuration = (2 + Math.random() * 2) + "s";
        heart.style.animationDelay = (Math.random() * 0.5) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3500);
    }
}

function spawnFlowers() {
    for (let i = 0; i < 10; i++) {
        const flower = document.createElement("div");
        flower.className = "flower";
        flower.style.left = (Math.random() * window.innerWidth) + "px";
        flower.style.bottom = "-30px";
        flower.style.animationDuration = (5 + Math.random() * 4) + "s";
        flower.style.animationDelay = (Math.random() * 2) + "s";
        flower.style.width = (18 + Math.random() * 10) + "px";
        flower.style.height = flower.style.width;
        document.body.appendChild(flower);
        setTimeout(() => flower.remove(), 8000);
    }
}

function spawnBees() {
    for (let i = 0; i < 5; i++) {
        const bee = document.createElement("div");
        bee.className = "bee";
        bee.style.left = (Math.random() * window.innerWidth) + "px";
        bee.style.bottom = (Math.random() * 100) + "px";
        bee.style.animationDuration = (3 + Math.random() * 3) + "s";
        bee.style.animationDelay = (Math.random() * 1) + "s";
        document.body.appendChild(bee);
        setTimeout(() => bee.remove(), 7000);
    }
}

function spawnSparkles() {
    for (let i = 0; i < 20; i++) {
        setTimeout(() => {
            const sparkle = document.createElement("div");
            sparkle.className = "sparkle";
            sparkle.style.left = (Math.random() * window.innerWidth) + "px";
            sparkle.style.top = (Math.random() * window.innerHeight) + "px";
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1500);
        }, i * 100);
    }
}

function spawnConfetti() {
    const colors = ["#ff4d85", "#ffcc00", "#00ccff", "#ff66cc", "#66ff66", "#ff9900"];
    for (let i = 0; i < 30; i++) {
        setTimeout(() => {
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = (Math.random() * window.innerWidth) + "px";
            confetti.style.top = (Math.random() * window.innerHeight / 2) + "px";
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
            confetti.style.width = (6 + Math.random() * 6) + "px";
            confetti.style.height = (6 + Math.random() * 6) + "px";
            confetti.style.animationDuration = (2 + Math.random() * 2) + "s";
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }, i * 80);
    }
}

function spawnBalloons() {
    const colors = ["#ff4d85", "#ffcc00", "#00ccff", "#ff66cc", "#66ff66"];
    for (let i = 0; i < 8; i++) {
        setTimeout(() => {
            const balloon = document.createElement("div");
            balloon.className = "balloon";
            balloon.style.left = (Math.random() * window.innerWidth) + "px";
            balloon.style.bottom = "-80px";
            balloon.style.background = `radial-gradient(circle at 30% 30%, ${colors[Math.floor(Math.random() * colors.length)]}, ${colors[Math.floor(Math.random() * colors.length)]})`;
            balloon.style.animationDuration = (3 + Math.random() * 2) + "s";
            balloon.style.animationDelay = (Math.random() * 1) + "s";
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 5000);
        }, i * 200);
    }
}

document.addEventListener("keydown", (e) => {
    const env = document.getElementById("env");
    if (!env.classList.contains("open")) return;

    if (e.key === "ArrowRight" || e.key === " ") {
        e.preventDefault();
        if (currentPage < pages.length - 1) {
            currentPage++;
            showPage();
        }
    } else if (e.key === "ArrowLeft") {
        e.preventDefault();
        if (currentPage > 0) {
            currentPage--;
            showPage();
        }
    }
});

updateButtons();
</script>

</body>
</html>
